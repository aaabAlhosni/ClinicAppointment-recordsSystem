spring:
  application:
    name: ClinicBookPatientSyetem

  datasource:
    url: jdbc:oracle:thin:@localhost:1521:ORCL          # TODO: update host/port/SID to match your instance
    driver-class-name: oracle.jdbc.OracleDriver
    username: clinic_user                                # TODO: your Oracle username
    password: your_password_here                         # TODO: your Oracle password

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.OracleDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false
